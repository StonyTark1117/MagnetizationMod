modLoader = "javafml"
loaderVersion = "[4,)"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''
logoFile = "logo.png"
issueTrackerURL = "https://github.com/StonyTark1117/MagnetizationMod/issues"
displayURL = "https://github.com/StonyTark1117/MagnetizationMod"

# Defensive mixin against vanilla DependencySorter.isCyclic SOE — protects every
# cross-mod tag we reference from broken upstream tags (e.g. self-references).
# See DependencySorterCycleFixMixin.
[[mixins]]
config = "magnetization.mixins.json"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "[21.1.219,22.0)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.1]"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "create"
type = "required"
versionRange = "[6.0.9,7.0)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "sable"
type = "required"
versionRange = "[1.1.1,2.0)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "aeronautics"
type = "required"
versionRange = "[1.1.0,2.0)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "simulated"
type = "required"
versionRange = "[1.1.0,2.0)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "jade"
type = "optional"
versionRange = "[15.0,)"
ordering = "AFTER"
side = "CLIENT"

[[dependencies.${mod_id}]]
modId = "waila"
type = "optional"
versionRange = "[12.0,)"
ordering = "AFTER"
side = "CLIENT"

[[dependencies.${mod_id}]]
modId = "theoneprobe"
type = "optional"
versionRange = "[12.0,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "jei"
type = "optional"
versionRange = "[19.0,)"
ordering = "AFTER"
side = "CLIENT"

[[dependencies.${mod_id}]]
modId = "roughlyenoughitems"
type = "optional"
versionRange = "[17.0,)"
ordering = "AFTER"
side = "CLIENT"

# Just Enough Resources — JEI add-on that surfaces ore-distribution graphs
# and mob loot tables. Optional; the addon registers magnetite distributions
# only when JER is installed.
[[dependencies.${mod_id}]]
modId = "jeresources"
type = "optional"
versionRange = "[1.6,)"
ordering = "AFTER"
side = "CLIENT"

# TerraBlender — required. Drives natural generation of the Magnetic Anomaly
# biome, and opens the door for other-mod biome interop (TerraBlender is the
# 1.21.1 ecosystem's de-facto biome injection lib, so being on it composes with
# Biomes O'Plenty, Terralith, etc.).
[[dependencies.${mod_id}]]
modId = "terrablender"
type = "required"
versionRange = "[4.1,)"
ordering = "BEFORE"
side = "BOTH"
