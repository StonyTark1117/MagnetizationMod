modLoader = "javafml"
loaderVersion = "[4,)"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''
logoFile = "logo.png"
issueTrackerURL = "https://github.com/StonyTark1117/MagnetizationMod/issues"
displayURL = "https://github.com/StonyTark1117/MagnetizationMod"

# Defensive mixin against vanilla DependencySorter.isCyclic SOE — protects every
# cross-mod tag we reference from broken upstream tags (e.g. self-references).
# See DependencySorterCycleFixMixin.
[[mixins]]
config = "magnetization.mixins.json"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "[21.1.228,22.0)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.1]"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "create"
type = "required"
# Open upper bound: a future major (7.x) is far more likely to still work than to
# need us blocked from launching. Loose ranges avoid a hard lock-out on updates.
versionRange = "[6.0.10,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "sable"
type = "required"
# Open upper bound — a Sable major bump (3.x) shouldn't hard-block us from
# launching (the 2.x/aero update breakage taught us this). Loose by design.
versionRange = "[2.0.0,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "aeronautics"
type = "required"
versionRange = "[1.3.0,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "simulated"
type = "required"
versionRange = "[1.3.0,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "jade"
type = "optional"
versionRange = "[15.0,)"
ordering = "AFTER"
side = "CLIENT"

[[dependencies.${mod_id}]]
modId = "waila"
type = "optional"
versionRange = "[12.0,)"
ordering = "AFTER"
side = "CLIENT"

[[dependencies.${mod_id}]]
modId = "theoneprobe"
type = "optional"
versionRange = "[12.0,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "jei"
type = "optional"
versionRange = "[19.0,)"
ordering = "AFTER"
side = "CLIENT"

[[dependencies.${mod_id}]]
modId = "roughlyenoughitems"
type = "optional"
versionRange = "[17.0,)"
ordering = "AFTER"
side = "CLIENT"

# Iris — client-only shaders mod. Declared optional + CLIENT so it never affects
# the dedicated server or load order on it; purely so we advertise compatibility
# and sit AFTER it on the client.
[[dependencies.${mod_id}]]
modId = "iris"
type = "optional"
versionRange = "*"
ordering = "AFTER"
side = "CLIENT"

# Just Enough Resources — JEI add-on that surfaces ore-distribution graphs
# and mob loot tables. Optional; the addon registers magnetite distributions
# only when JER is installed.
[[dependencies.${mod_id}]]
modId = "jeresources"
type = "optional"
versionRange = "[1.6,)"
ordering = "AFTER"
side = "CLIENT"

# TerraBlender — required. Drives natural generation of the Magnetic Anomaly
# biome, and opens the door for other-mod biome interop (TerraBlender is the
# 1.21.1 ecosystem's de-facto biome injection lib, so being on it composes with
# Biomes O'Plenty, Terralith, etc.).
[[dependencies.${mod_id}]]
modId = "terrablender"
type = "required"
versionRange = "[4.1,)"
ordering = "BEFORE"
side = "BOTH"

# Create: The Factory Must Grow — optional. Supplies aluminium: gallium ingots
# can be re-smelted from aluminium ingots (#c:ingots/aluminum) and raw gallium
# drops as a byproduct of mining bauxite. Without TFMG, gallium comes entirely
# from Create's zinc, so this stays optional.
[[dependencies.${mod_id}]]
modId = "tfmg"
type = "optional"
versionRange = "[1.1,)"
ordering = "AFTER"
side = "BOTH"
